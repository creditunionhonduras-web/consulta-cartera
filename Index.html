<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta Cartera — CREDIT UNION</title>
<style>
  /* ── TOKENS ─────────────────────────────────────── */
  :root {
    --navy:     #2B3952;
    --blue:     #435782;
    --green:    #6AC187;
    --red:      #b03a2e;
    --orange:   #ca6f1e;
    --yellow:   #b7950b;
    --bg:       #f0f2f7;
    --surface:  #ffffff;
    --border:   #dde2ed;
    --text:     #1a2035;
    --muted:    #6b7a99;
    --radius:   10px;
    --shadow:   0 2px 16px rgba(43,57,82,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── LOGIN ──────────────────────────────────────── */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
  }

  .loginCard {
    background: var(--surface);
    border-radius: 16px;
    padding: 48px 40px;
    width: 360px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
  }

  .loginLogo {
    text-align: center;
    margin-bottom: 32px;
  }

  .loginLogo .mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
    background: var(--navy);
    border-radius: 12px;
    color: var(--green);
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 12px;
  }

  .loginLogo h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.3px;
  }

  .loginLogo p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--blue); }

  .btnPrimary {
    width: 100%;
    padding: 12px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }

  .btnPrimary:hover { background: var(--blue); }

  .loginError {
    background: #fdf2f2;
    color: var(--red);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
    text-align: center;
  }

  /* ── APP SHELL ──────────────────────────────────── */
  #appShell { display: none; min-height: 100vh; }

  .topBar {
    background: var(--navy);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .topBarLeft {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topBarMark {
    background: var(--green);
    color: var(--navy);
    font-weight: 900;
    font-size: 14px;
    width: 32px;
    height: 32px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .topBarTitle {
    color: #fff;
    font-size: 15px;
    font-weight: 600;
  }

  .topBarRight {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topBarUser {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
  }

  .btnLogout {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btnLogout:hover { background: rgba(255,255,255,0.2); }

  /* ── BÚSQUEDA ───────────────────────────────────── */
  .searchBar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }

  .searchRow {
    display: flex;
    gap: 10px;
    max-width: 720px;
  }

  .searchInput {
    flex: 1;
    padding: 11px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .searchInput:focus { border-color: var(--blue); }

  .btnSearch {
    padding: 11px 20px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }

  .btnSearch:hover { background: var(--blue); }

  .searchHint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── CONTENIDO ──────────────────────────────────── */
  .appContent {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ── ESTADOS ────────────────────────────────────── */
  .stateBox {
    text-align: center;
    padding: 64px 24px;
    color: var(--muted);
  }

  .stateBox .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .stateBox p { font-size: 15px; }

  /* ── TARJETA CLIENTE ────────────────────────────── */
  .clienteCard {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .clienteHeader {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .clienteHeader:hover { background: #f8f9fd; }

  .clienteAvatar {
    width: 40px;
    height: 40px;
    background: var(--navy);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green);
    font-weight: 700;
    font-size: 16px;
    flex-shrink: 0;
  }

  .clienteInfo { flex: 1; min-width: 0; }

  .clienteNombre {
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .clienteMeta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 12px;
  }

  .clienteBadges {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }

  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-mora  { background: #fdf2f2; color: var(--red);    }
  .badge-ok    { background: #eafaf1; color: #1e8449;       }
  .badge-count { background: #eef1f9; color: var(--navy);   }

  /* ── LISTA DE CRÉDITOS ──────────────────────────── */
  .creditosList {
    border-top: 1px solid var(--border);
    display: none;
  }

  .creditosList.open { display: block; }

  .creditoItem {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .creditoItem:last-child { border-bottom: none; }
  .creditoItem:hover { background: #f0f4ff; }

  .creditoNum {
    font-size: 13px;
    font-weight: 700;
    color: var(--navy);
    min-width: 80px;
  }

  .creditoNombre {
    flex: 1;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .creditoMonto {
    font-size: 13px;
    font-weight: 600;
    text-align: right;
    min-width: 100px;
  }

  .creditoDias {
    font-size: 12px;
    font-weight: 700;
    min-width: 60px;
    text-align: center;
  }

  .dias-critico { color: var(--red); }
  .dias-medio   { color: var(--orange); }
  .dias-temprano{ color: var(--yellow); }
  .dias-ok      { color: #1e8449; }

  /* ── MODAL DETALLE ──────────────────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 24px;
    overflow-y: auto;
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 14px;
    width: 100%;
    max-width: 780px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    overflow: hidden;
    margin: auto;
  }

  .modalHeader {
    background: var(--navy);
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modalHeader h2 {
    color: #fff;
    font-size: 16px;
    font-weight: 700;
  }

  .modalHeader p {
    color: var(--green);
    font-size: 12px;
    margin-top: 2px;
  }

  .btnClose {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── TABS ───────────────────────────────────────── */
  .tabBar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: #f8f9fd;
  }

  .tabBtn {
    padding: 12px 20px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tabBtn.active {
    color: var(--navy);
    border-bottom-color: var(--navy);
    background: var(--surface);
  }

  .tabPanel { display: none; padding: 20px 24px; }
  .tabPanel.active { display: block; }

  /* ── FICHA GRID ─────────────────────────────────── */
  .fichaGrid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .fichaSection {
    padding: 16px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .fichaSection:nth-child(even) { border-right: none; }
  .fichaSection:nth-last-child(-n+2) { border-bottom: none; }

  .fichaSection h4 {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .fichaRow {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
    gap: 8px;
  }

  .fichaLabel {
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .fichaValue {
    font-size: 13px;
    font-weight: 500;
    text-align: right;
  }

  .fichaValue.big {
    font-size: 18px;
    font-weight: 700;
    color: var(--navy);
  }

  .fichaValue.mora {
    color: var(--red);
    font-weight: 700;
  }

  /* ── HISTORIAL TABLE ────────────────────────────── */
  .histTable {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .histTable th {
    background: #f0f2f7;
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  .histTable td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .histTable tr:last-child td { border-bottom: none; }
  .histTable tr:hover td { background: #f8f9fd; }

  .estadoBadge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .estado-V { background: #eafaf1; color: #1e8449; }
  .estado-C { background: #eef1f9; color: var(--blue); }
  .estado-other { background: #f8f9fd; color: var(--muted); }

  /* ── AVALES ─────────────────────────────────────── */
  .avalesHeader {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .avalesHeader h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--navy);
  }

  .btnAdd {
    padding: 8px 16px;
    background: var(--green);
    color: var(--navy);
    border: none;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btnAdd:hover { opacity: 0.85; }

  .avalCard {
    background: #f8f9fd;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .avalNombre {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
  }

  .avalMeta {
    display: flex;
    gap: 16px;
    font-size: 12px;
    color: var(--muted);
    flex-wrap: wrap;
  }

  .avalMeta span { display: flex; align-items: center; gap: 4px; }

  /* ── FORM AVAL ──────────────────────────────────── */
  .formAval { margin-top: 16px; }

  .formAval .field input {
    background: #fff;
  }

  .formRow {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .formActions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .btnSave {
    flex: 1;
    padding: 11px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .btnCancel {
    padding: 11px 20px;
    background: #f0f2f7;
    color: var(--text);
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
  }

  /* ── LOADING ────────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loadingRow {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
  }

  .emptyRow {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── TOAST ──────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--navy);
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: var(--shadow);
    z-index: 999;
    display: none;
    animation: slideUp 0.3s ease;
  }

  .toast.show { display: block; }
  .toast.success { background: #1e8449; }
  .toast.error   { background: var(--red); }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  /* ── RESPONSIVE ─────────────────────────────────── */
  @media (max-width: 600px) {
    .fichaGrid { grid-template-columns: 1fr; }
    .fichaSection { border-right: none; }
    .formRow { grid-template-columns: 1fr; }
    .appContent { padding: 12px; }
    .topBarTitle { display: none; }
    .creditoNombre { display: none; }
    .modal { margin: 0; border-radius: 14px 14px 0 0; }
    .overlay { align-items: flex-end; padding: 0; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════ -->
<!-- LOGIN                                             -->
<!-- ══════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="loginCard">
    <div class="loginLogo">
      <div class="mark">▲</div>
      <h1>CREDIT UNION</h1>
      <p>Consulta de Cartera Activa</p>
    </div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="asesores" autocomplete="username">
    </div>
    <div class="field">
      <label>Clave</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btnPrimary" id="btnLogin">Ingresar</button>
    <div class="loginError" id="loginError">Usuario o clave incorrectos</div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ -->
<!-- APP SHELL                                         -->
<!-- ══════════════════════════════════════════════════ -->
<div id="appShell">

  <!-- TOP BAR -->
  <div class="topBar">
    <div class="topBarLeft">
      <div class="topBarMark">▲</div>
      <span class="topBarTitle">Consulta Cartera</span>
    </div>
    <div class="topBarRight">
      <span class="topBarUser" id="topUser"></span>
      <button class="btnLogout" id="btnLogout">Salir</button>
    </div>
  </div>

  <!-- BÚSQUEDA -->
  <div class="searchBar">
    <div class="searchRow">
      <input type="text" class="searchInput" id="searchInput"
        placeholder="Buscar por nombre, # crédito o número de identidad...">
      <button class="btnSearch" id="btnSearch">Buscar</button>
    </div>
    <p class="searchHint">Ingrese al menos 3 caracteres para buscar</p>
  </div>

  <!-- RESULTADOS -->
  <div class="appContent">
    <div id="resultados">
      <div class="stateBox">
        <div class="icon">🔍</div>
        <p>Busque un cliente por nombre, número de crédito o identidad</p>
      </div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════════════ -->
<!-- MODAL DETALLE CRÉDITO                            -->
<!-- ══════════════════════════════════════════════════ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modalHeader">
      <div>
        <h2 id="modalTitle">Crédito #</h2>
        <p id="modalSubtitle"></p>
      </div>
      <button class="btnClose" id="btnClose">✕</button>
    </div>

    <div class="tabBar">
      <button class="tabBtn active" data-tab="ficha">Ficha del Crédito</button>
      <button class="tabBtn" data-tab="historial">Historial</button>
      <button class="tabBtn" data-tab="avales">Avales</button>
    </div>

    <div class="tabPanel active" id="tab-ficha">
      <div id="fichaContent"><div class="loadingRow"><span class="spinner"></span> Cargando...</div></div>
    </div>

    <div class="tabPanel" id="tab-historial">
      <div id="historialContent"><div class="loadingRow"><span class="spinner"></span> Cargando...</div></div>
    </div>

    <div class="tabPanel" id="tab-avales">
      <div id="avalesContent"><div class="loadingRow"><span class="spinner"></span> Cargando...</div></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════


// ══════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════
let session = null;
let currentCredito = null;
let currentIdentidad = null;
let mostrandoFormAval = false;

// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwg_jh0-Tl8PNdmxadNxbLm5dBs5kFDCzwQAwjzJfE8spsLt9bd8UK6Q9JBLzBMBBcq/exec';

// ══════════════════════════════════════════════════════
// API — JSONP (resuelve CORS con Apps Script)
// ══════════════════════════════════════════════════════
let _jsonpCounter = 0;

function api(action, params) {
  params = params || {};
  return new Promise(function(resolve, reject) {
    var cbName = '_cb_' + (++_jsonpCounter);

    var timeout = setTimeout(function() {
      delete window[cbName];
      var s = document.getElementById(cbName);
      if (s) s.parentNode.removeChild(s);
      reject(new Error('Timeout de conexión'));
    }, 60000);

    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      var s = document.getElementById(cbName);
      if (s) s.parentNode.removeChild(s);
      resolve(data);
    };

    // Construir URL manualmente para mayor compatibilidad
    var url = SCRIPT_URL + '?callback=' + cbName + '&action=' + encodeURIComponent(action);
    for (var key in params) {
      if (params.hasOwnProperty(key)) {
        url += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(params[key]);
      }
    }

    var script = document.createElement('script');
    script.id = cbName;
    script.type = 'text/javascript';
    script.src = url;
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[cbName];
      script.parentNode.removeChild(script);
      reject(new Error('Error de conexión'));
    };
    document.getElementsByTagName('head')[0].appendChild(script);
  });
}

// ══════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════
document.getElementById('btnLogin').addEventListener('click', doLogin);
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const btn    = document.getElementById('btnLogin');
  const errDiv = document.getElementById('loginError');
  const user   = document.getElementById('loginUser').value.trim();
  const pass   = document.getElementById('loginPass').value;

  if (!user || !pass) return;

  btn.innerHTML = '<span class="spinner"></span> Ingresando...';
  btn.disabled  = true;
  errDiv.style.display = 'none';

  try {
    const r = await api('login', { usuario: user, clave: pass });
    if (r.ok) {
      session = r.usuario;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appShell').style.display = 'block';
      document.getElementById('topUser').textContent = 'Bienvenido, ' + session;
      document.getElementById('searchInput').focus();
    } else {
      errDiv.style.display = 'block';
      document.getElementById('loginPass').value = '';
    }
  } catch(e) {
    errDiv.textContent = 'Error de conexión. Intente de nuevo.';
    errDiv.style.display = 'block';
  }

  btn.innerHTML = 'Ingresar';
  btn.disabled  = false;
}

// ══════════════════════════════════════════════════════
// LOGOUT
// ══════════════════════════════════════════════════════
document.getElementById('btnLogout').addEventListener('click', () => {
  session = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appShell').style.display    = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('resultados').innerHTML = `
    <div class="stateBox">
      <div class="icon">🔍</div>
      <p>Busque un cliente por nombre, número de crédito o identidad</p>
    </div>`;
});

// ══════════════════════════════════════════════════════
// BÚSQUEDA
// ══════════════════════════════════════════════════════
document.getElementById('btnSearch').addEventListener('click', doBuscar);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doBuscar();
});

async function doBuscar() {
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 3) {
    showToast('Ingrese al menos 3 caracteres', 'error');
    return;
  }

  const btn = document.getElementById('btnSearch');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;

  const res = document.getElementById('resultados');
  res.innerHTML = '<div class="loadingRow"><span class="spinner" style="border-color:rgba(67,87,130,0.3);border-top-color:var(--navy)"></span> Buscando...</div>';

  try {
    const r = await api('buscar', { query: q });
    if (!r.ok) { res.innerHTML = `<div class="stateBox"><p>${r.msg}</p></div>`; return; }
    if (!r.data.length) {
      res.innerHTML = '<div class="stateBox"><div class="icon">📭</div><p>No se encontraron resultados</p></div>';
      return;
    }
    renderResultados(r.data);
  } catch(e) {
    res.innerHTML = '<div class="stateBox"><p>Error de conexión. Intente de nuevo.</p></div>';
  }

  btn.innerHTML = 'Buscar';
  btn.disabled  = false;
}

function renderResultados(clientes) {
  const html = clientes.map(cli => {
    const inicial   = (cli.nombre || '?')[0].toUpperCase();
    const totalMora = cli.creditos.reduce((s,c) => s + c.mora, 0);
    const enMora    = cli.creditos.filter(c => c.dias > 0).length;
    const badgeMora = enMora > 0
      ? `<span class="badge badge-mora">${enMora} en mora</span>`
      : `<span class="badge badge-ok">Al día</span>`;

    const credItems = cli.creditos.map(c => {
      const clsDias = c.dias >= 91 ? 'dias-critico' : c.dias >= 31 ? 'dias-medio' : c.dias >= 1 ? 'dias-temprano' : 'dias-ok';
      const diasTxt = c.dias > 0 ? `<span class="${clsDias}">${c.dias}d mora</span>` : `<span class="dias-ok">Al día</span>`;
      return `
        <div class="creditoItem" onclick="abrirDetalle('${c.num}','${cli.identidad}','${escHtml(cli.nombre)}')">
          <div class="creditoNum">#${c.num}</div>
          <div class="creditoNombre">${escHtml(c.estado)}</div>
          <div class="creditoDias">${diasTxt}</div>
          <div class="creditoMonto">L. ${fmtNum(c.saldo)}</div>
        </div>`;
    }).join('');

    return `
      <div class="clienteCard">
        <div class="clienteHeader" onclick="toggleCreditos(this)">
          <div class="clienteAvatar">${inicial}</div>
          <div class="clienteInfo">
            <div class="clienteNombre">${escHtml(cli.nombre)}</div>
            <div class="clienteMeta">
              <span>${cli.identidad || '—'}</span>
              <span>${cli.agencia || ''}</span>
              ${cli.telefono ? `<span>📞 ${cli.telefono}</span>` : ''}
            </div>
          </div>
          <div class="clienteBadges">
            ${badgeMora}
            <span class="badge badge-count">${cli.creditos.length} crédito${cli.creditos.length !== 1 ? 's' : ''}</span>
          </div>
        </div>
        <div class="creditosList">${credItems}</div>
      </div>`;
  }).join('');

  document.getElementById('resultados').innerHTML = html;

  // Si solo hay un cliente, expandir automáticamente
  if (clientes.length === 1) {
    const header = document.querySelector('.clienteHeader');
    if (header) toggleCreditos(header);
  }
}

function toggleCreditos(header) {
  const lista = header.nextElementSibling;
  lista.classList.toggle('open');
}

// ══════════════════════════════════════════════════════
// MODAL DETALLE
// ══════════════════════════════════════════════════════
async function abrirDetalle(numCredito, identidad, nombreCliente) {
  currentCredito  = numCredito;
  currentIdentidad = identidad;

  document.getElementById('modalTitle').textContent   = 'Crédito #' + numCredito;
  document.getElementById('modalSubtitle').textContent = nombreCliente;
  document.getElementById('overlay').classList.add('open');

  // Reset tabs
  document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tabPanel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-tab="ficha"]').classList.add('active');
  document.getElementById('tab-ficha').classList.add('active');

  // Loading state
  document.getElementById('fichaContent').innerHTML    = '<div class="loadingRow"><span class="spinner" style="border-color:rgba(67,87,130,0.3);border-top-color:var(--navy)"></span> Cargando ficha...</div>';
  document.getElementById('historialContent').innerHTML = '<div class="loadingRow"><span class="spinner" style="border-color:rgba(67,87,130,0.3);border-top-color:var(--navy)"></span> Cargando historial...</div>';
  document.getElementById('avalesContent').innerHTML    = '<div class="loadingRow"><span class="spinner" style="border-color:rgba(67,87,130,0.3);border-top-color:var(--navy)"></span> Cargando avales...</div>';

  // Cargar solo ficha al abrir — historial y avales se cargan al hacer clic
  api('detalle', { numCredito }).then(function(rDet) {
    renderFicha(rDet);
  }).catch(function(e) {
    document.getElementById('fichaContent').innerHTML = '<div class="emptyRow">Error al cargar ficha</div>';
  });

  // Marcar historial y avales como pendientes de carga
  document.getElementById('historialContent').innerHTML = '<div class="emptyRow">Haga clic en esta pestaña para cargar el historial</div>';
  document.getElementById('avalesContent').innerHTML = '<div class="emptyRow">Haga clic en esta pestaña para cargar los avales</div>';
  
  // Guardar datos para carga lazy
  window._currentIdentidad  = identidad;
  window._currentNumCredito = numCredito;
  window._historialCargado  = false;
  window._avalesCargado     = false;
}

document.getElementById('btnClose').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('open');
});

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
});

// ── TABS
document.querySelectorAll('.tabBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tabPanel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');

    // Carga lazy — solo cuando se hace clic por primera vez
    if (btn.dataset.tab === 'historial' && !window._historialCargado) {
      window._historialCargado = true;
      document.getElementById('historialContent').innerHTML =
        '<div class="loadingRow"><span class="spinner" style="border-color:rgba(67,87,130,0.3);border-top-color:var(--navy)"></span> Cargando historial...</div>';
      api('historialCred', { identidad: window._currentIdentidad })
        .then(function(r) { renderHistorial(r); })
        .catch(function(e) {
          document.getElementById('historialContent').innerHTML = '<div class="emptyRow">Error al cargar historial</div>';
        });
    }

    if (btn.dataset.tab === 'avales' && !window._avalesCargado) {
      window._avalesCargado = true;
      document.getElementById('avalesContent').innerHTML =
        '<div class="loadingRow"><span class="spinner" style="border-color:rgba(67,87,130,0.3);border-top-color:var(--navy)"></span> Cargando avales...</div>';
      api('avales', { numCredito: window._currentNumCredito, identidad: window._currentIdentidad })
        .then(function(r) { renderAvales(r, window._currentNumCredito); })
        .catch(function(e) {
          document.getElementById('avalesContent').innerHTML = '<div class="emptyRow">Error al cargar avales</div>';
        });
    }
  });
});

// ══════════════════════════════════════════════════════
// RENDER HISTORIAL
// ══════════════════════════════════════════════════════
function renderHistorial(r) {
  const el = document.getElementById('historialContent');
  if (!r.ok || !r.data.length) {
    el.innerHTML = `<div class="emptyRow">📋 ${r.msg || 'Sin historial de créditos previos'}</div>`;
    return;
  }

  const filas = r.data.map(h => {
    const clsEst  = h.estado === 'V' ? 'estado-V' : h.estado === 'C' ? 'estado-C' : 'estado-other';
    const txtEst  = h.estado === 'V' ? 'Vigente' : h.estado === 'C' ? 'Cancelado' : h.estado;
    return `<tr>
      <td><strong>#${h.numCredito}</strong></td>
      <td>${h.nombreCheque || '—'}</td>
      <td>L. ${fmtNum(h.monto)}</td>
      <td>${h.plazo} m.</td>
      <td>${h.tasa}%</td>
      <td>${h.fechaEntrega || '—'}</td>
      <td>${h.fechaCancel || '—'}</td>
      <td><span class="estadoBadge ${clsEst}">${txtEst}</span></td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <div style="overflow-x:auto">
      <table class="histTable">
        <thead><tr>
          <th># Crédito</th><th>Nombre</th><th>Monto</th>
          <th>Plazo</th><th>Tasa</th><th>Entrega</th>
          <th>Cancelación</th><th>Estado</th>
        </tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:10px;text-align:right">
      ${r.data.length} crédito${r.data.length !== 1 ? 's' : ''} en historial
    </p>`;
}

// ══════════════════════════════════════════════════════
// RENDER AVALES
// ══════════════════════════════════════════════════════
function renderAvales(r, numCredito) {
  var el = document.getElementById('avalesContent');

  var avalesHtml = '';
  if (!r.ok || !r.data || !r.data.length) {
    avalesHtml = '<div class="emptyRow">Sin avales registrados para este crédito</div>';
  } else {
    avalesHtml = r.data.map(function(a) {
      return '<div class="avalCard">'
        + '<div class="avalNombre">' + escHtml(a.nombre) + '</div>'
        + '<div class="avalMeta">'
        + '<span>🪪 ' + (a.identidad || '—') + '</span>'
        + '<span>📞 ' + (a.telefono  || '—') + '</span>'
        + '<span>📍 ' + (a.direccion || '—') + '</span>'
        + (a.tipo ? '<span style="margin-left:auto;background:#eef1f9;color:var(--blue);padding:2px 8px;border-radius:12px;font-size:11px;">' + a.tipo + '</span>' : '')
        + '</div>'
        + '</div>';
    }).join('');
  }

  el.innerHTML = '<div class="avalesHeader">'
    + '<h3>Avales del Crédito #' + numCredito + '</h3>'
    + '<span style="font-size:12px;color:var(--muted);">' + (r.data ? r.data.length : 0) + ' aval(es)</span>'
    + '</div>'
    + avalesHtml;
}

function toggleFormAval() {
  const form = document.getElementById('formAvalContainer');
  mostrandoFormAval = !mostrandoFormAval;
  form.style.display = mostrandoFormAval ? 'block' : 'none';
  if (mostrandoFormAval) document.getElementById('avalNombre').focus();
}

async function guardarAval(numCredito) {
  const nombre    = document.getElementById('avalNombre').value.trim();
  const identidad = document.getElementById('avalIdentidad').value.trim();
  const telefono  = document.getElementById('avalTelefono').value.trim();
  const direccion = document.getElementById('avalDireccion').value.trim();

  if (!nombre || !identidad || !telefono) {
    showToast('Complete nombre, identidad y teléfono', 'error');
    return;
  }

  const btn = document.querySelector('.btnSave');
  btn.innerHTML = '<span class="spinner"></span> Guardando...';
  btn.disabled  = true;

  try {
    const r = await api('agregarAval', {
      numCredito, nombre, identidad, telefono, direccion,
      registradoPor: session
    });

    if (r.ok) {
      showToast('Aval registrado correctamente', 'success');
      // Recargar avales
      const rAv = await api('avales', { numCredito });
      renderAvales(rAv, numCredito);
    } else {
      showToast(r.msg || 'Error al guardar', 'error');
      btn.innerHTML = 'Guardar Aval';
      btn.disabled  = false;
    }
  } catch(e) {
    showToast('Error de conexión', 'error');
    btn.innerHTML = 'Guardar Aval';
    btn.disabled  = false;
  }
}

// ══════════════════════════════════════════════════════
// HELPERS UI
// ══════════════════════════════════════════════════════
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent  = msg;
  t.className    = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

function fmtNum(n) {
  return Number(n).toLocaleString('es-HN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
